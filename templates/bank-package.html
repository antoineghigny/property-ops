<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Property-Ops Bank Package</title>
    <style>
      :root {
        --ink: #17202a;
        --muted: #52606d;
        --accent: #165dff;
        --line: #d9e2ec;
        --paper: #ffffff;
        --soft: #f5f7fa;
      }

      * { box-sizing: border-box; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        margin: 0;
        background: var(--paper);
        line-height: 1.45;
      }
      .page {
        padding: 28px 34px;
      }
      .hero {
        border-bottom: 3px solid var(--accent);
        padding-bottom: 12px;
        margin-bottom: 24px;
      }
      h1, h2, h3 {
        margin: 0 0 10px;
      }
      h1 {
        font-size: 28px;
      }
      h2 {
        font-size: 18px;
        margin-top: 26px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--line);
      }
      .meta, .summary-grid, .two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 20px;
      }
      .card {
        background: var(--soft);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
      }
      .metric {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
      }
      .value {
        font-size: 18px;
        font-weight: 700;
      }
      ul {
        margin: 8px 0 0 18px;
        padding: 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th, td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: var(--soft);
      }
      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    {{{contentHtml}}}
  </body>
</html>
